name: Auto-Generate Manifest
on:
  push:
    branches: [ main ]
    paths:
      - 'playbooks/**/info.json'
  workflow_dispatch: # Permet de lancer le bouton manuellement si besoin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Passage en v4 pour Node 24

      - name: Generate Manifest
        run: |
          # On cherche tous les info.json, on les fusionne proprement avec jq
          # Le flag -s (slurp) crée automatiquement le tableau avec les virgules
          find playbooks -name "info.json" | xargs cat | jq -s '{version: "1.0.0", packages: .}' > manifest.json
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. On récupère les changements distants (tes modifs de workflow)
          # Le rebase permet de mettre le manifest "au-dessus" proprement
          git pull --rebase origin main
          
          # 2. On ajoute le fichier généré
          git add manifest.json
          
          # 3. On commit seulement s'il y a du nouveau
          git commit -m "chore: auto-update manifest.json [skip ci]" || exit 0
          
          # 4. On pousse enfin
          git push origin main
