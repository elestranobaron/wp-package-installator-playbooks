name: Auto-Generate Manifest
on:
  push:
    branches: [ main ]
    paths:
      - 'playbooks/**/info.json'
      - '.github/workflows/**' # On surveille aussi le workflow lui-même
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les soucis de rebase

      - name: Generate Manifest
        run: |
          find playbooks -name "info.json" | xargs cat | jq -s '{version: "1.0.0", packages: .}' > manifest.json
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add manifest.json
          
          # On commit seulement s'il y a un changement
          git commit -m "chore: auto-update manifest.json [skip ci]" || exit 0
          
          # On tente un pull rebase, et si ça rejette encore, on force
          git pull --rebase origin main
          git push origin main || git push --force origin main
